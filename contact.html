<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="finalproject.css">
<link rel="stylesheet" href="finalproject-large.css">
<script defer src="finalproject.js"></script>
</head>
<body>
<header class="container">
  <h1>Contact Us</h1>
</header>

<main class="container">
  <section class="card form-card">
    <h2>Get in Touch</h2>
    <p>Have questions? Fill out the form and our team will respond within 24 hours.</p>

    <form id="contactForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="4" placeholder="Write your message..." required></textarea>
      </div>

      <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <p id="formResponse" class="success-message"></p>
  </section>
</main>

<footer>
  <a href="index.html">Home</a>
</footer>
</body>
</html>
